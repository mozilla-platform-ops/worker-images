name: Upload Release Notes

on:
  workflow_call:
    inputs:
      artifact_pattern:
        type: string
        default: release-notes-*
      commit_message:
        type: string
        default: Update release notes

jobs:
  sbom:
    name: Upload release notes
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    concurrency:
      group: release-notes-main
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: sboms
          pattern: ${{ inputs.artifact_pattern }}
          merge-multiple: true
      - name: Validate downloaded release notes
        shell: bash
        run: |
          if ls sboms/*.md >/dev/null 2>&1; then
            echo "Downloaded release notes:"
            ls -1 sboms/*.md
          else
            echo "No release notes were downloaded from successful packer jobs."
            exit 1
          fi
      - name: Pull latest main
        run: git pull --rebase --autostash origin main
      - name: Commit release notes to main
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d
        with:
          branch: main
          commit_message: ${{ inputs.commit_message }}
          file_pattern: sboms/*.md
