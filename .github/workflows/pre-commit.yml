name: linting

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.11'

    - name: Install pre-commit
      run: pip install pre-commit

    - name: Cache pre-commit environments
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ~/.cache/pre-commit
        key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

    - name: Run pre-commit on all files
      run: |
        echo "Running pre-commit on all files"
        pre-commit run --all-files

  shellcheck:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Get changed shell files
      id: changed-shell-files
      uses: tj-actions/changed-files@7dee1b0c1557f278e5c7dc244927139d78c0e22a # v47.0.4
      with:
        files: |
          **/*.sh
          **/*.bash
          **/*.ksh
          **/*.zsh

    - name: Run ShellCheck
      if: steps.changed-shell-files.outputs.any_changed == 'true'
      uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
      with:
        scandir: '.'
        format: gcc
        severity: warning
        additional_files: ${{ steps.changed-shell-files.outputs.all_changed_files }}

    - name: Skip shellcheck if no shell files changed
      if: steps.changed-shell-files.outputs.any_changed == 'false'
      run: |
        echo "No shell files changed, skipping shellcheck"

  psscriptanalyzer:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Get changed PowerShell test files
      id: changed-ps-files
      uses: tj-actions/changed-files@7dee1b0c1557f278e5c7dc244927139d78c0e22a # v47.0.4
      with:
        files: |
          tests/**/*.ps1

    - name: Run PSScriptAnalyzer
      if: steps.changed-ps-files.outputs.any_changed == 'true'
      shell: pwsh
      run: |
        Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
        $results = Invoke-ScriptAnalyzer -Path tests/ -Settings tests/PSScriptAnalyzerSettings.psd1 -Recurse
        if ($results) {
            $results | Format-Table -AutoSize
            Write-Error "PSScriptAnalyzer found $($results.Count) issue(s)"
            exit 1
        }
        Write-Host "PSScriptAnalyzer: no issues found"

    - name: Skip PSScriptAnalyzer if no test files changed
      if: steps.changed-ps-files.outputs.any_changed == 'false'
      run: |
        echo "No PowerShell test files changed, skipping PSScriptAnalyzer"
