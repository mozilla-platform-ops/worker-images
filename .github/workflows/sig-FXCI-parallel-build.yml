name: FXCI - Azure Prod Parallel Images
run-name: Azure Production Parallel - ${{ github.sha }}

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  prepare-matrix:
    name: Prepare Production Image Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      os_integration_matrix: ${{ steps.set-matrix.outputs.os_integration_matrix }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install PowerShell-YAML module
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module powershell-yaml -Force

      - id: set-matrix
        name: Extract Azure production configs
        shell: pwsh
        run: |
          $yaml = ConvertFrom-Yaml (Get-Content ./config/windows_production_defaults.yaml -Raw)
          $prodImages = @($yaml.images.production | Sort-Object)
          $trustedImages = @(
            Get-ChildItem -Path ./config -File -Filter "trusted-*.yaml" |
              ForEach-Object { $_.BaseName } |
              Where-Object { $_ -match '^trusted-(?!gw-fxci-gcp).*' -and $_ -notmatch 'alpha' } |
              Sort-Object
          )

          if (-not $prodImages -or $prodImages.Count -eq 0) {
            Write-Host "::error ::No untrusted production images found in YAML"
            exit 1
          }

          $matrixEntries = @()
          foreach ($config in $prodImages) {
            $matrixEntries += @{
              config = $config
              client_id_secret = 'AZURE_CLIENT_ID_FXCI'
              subscription_id_secret = 'AZURE_SUBSCRIPTION_ID_UNTRUSTED'
              application_id_secret = 'AZURE_APPLICATION_ID_FXCI'
              run_os_integration = ($config -notmatch '^win2022' -and $config -notmatch '^win11-a64.*builder')
            }
          }

          foreach ($config in $trustedImages) {
            $matrixEntries += @{
              config = $config
              client_id_secret = 'AZURE_CLIENT_ID_FXCI_TRUSTED'
              subscription_id_secret = 'AZURE_SUBSCRIPTION_ID_TRUSTED'
              application_id_secret = 'AZURE_APPLICATION_ID_FXCI_TRUSTED'
              run_os_integration = $false
            }
          }

          $matrix = @{ include = @($matrixEntries) } | ConvertTo-Json -Compress -Depth 10
          Write-Host "Generated matrix: $matrix"
          "matrix=$matrix" >> $env:GITHUB_OUTPUT

          $osIntEntries = @(
            $matrixEntries |
              Where-Object { $_.run_os_integration } |
              ForEach-Object { @{ config = $_.config } }
          )
          $osIntMatrix = @{ include = @($osIntEntries) } | ConvertTo-Json -Compress -Depth 10
          Write-Host "Generated os-integration matrix: $osIntMatrix"
          "os_integration_matrix=$osIntMatrix" >> $env:GITHUB_OUTPUT

  check-access:
    name: "Verify User Access"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Load Authorized Users and Check Access
        shell: pwsh
        run: |
          $AUTHORIZED_USERS=$(Get-Content .github/relsre.json | Convertfrom-Json)
          if ($authorized_users -contains "${{ github.actor }}") {
            Write-host "User ${{ github.actor }} is authorized."
          }
          else {
            Write-Host "User ${{ github.actor }} is unauthorized."
            exit 1
          }

  packer:
    needs: [check-access, prepare-matrix]
    name: "Build ${{ matrix.config }}"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Azure Login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5
        with:
          client-id: ${{ secrets[matrix.client_id_secret] }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets[matrix.subscription_id_secret] }}
          enable-AzPSSession: true
      - name: 'Run Packer'
        shell: pwsh
        run: |
          Import-Module .\bin\WorkerImages\WorkerImages.psm1
          $Vars = @{
            github_token = "${{ secrets.GITHUB_TOKEN }}"
            Key = '${{ matrix.config }}'
            Client_ID = "${{ secrets[matrix.client_id_secret] }}"
            oidc_request_url = "${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}"
            oidc_request_token = "${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}"
            Subscription_ID = "${{ secrets[matrix.subscription_id_secret] }}"
            Tenant_ID = "${{ secrets.AZURE_TENANT_ID }}"
            Application_ID = "${{ secrets[matrix.application_id_secret] }}"
          }
          New-AzSharedWorkerImage @Vars
          "sharedimageversion=$ENV:PKR_VAR_sharedimage_version" >> $env:GITHUB_ENV
      - name: Upload Release Notes Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: release-notes-${{ matrix.config }}
          path: ${{ matrix.config }}-${{ env.sharedimageversion }}.md
          overwrite: true
          retention-days: 1
          if-no-files-found: error

  sbom:
    if: ${{ always() }}
    needs: [prepare-matrix, packer]
    name: "Upload release notes"
    runs-on: ubuntu-latest
    permissions: write-all
    concurrency:
      group: release-notes-main
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
        with:
          path: sboms
          pattern: release-notes-*
          merge-multiple: true
      - name: "Validate downloaded release notes"
        shell: bash
        run: |
          if ls sboms/*.md >/dev/null 2>&1; then
            echo "Downloaded release notes:"
            ls -1 sboms/*.md
          else
            echo "No release notes were downloaded from successful packer jobs."
            exit 1
          fi
      - name: "Pull latest main"
        run: git pull --rebase --autostash origin main
      - name: "Commit release notes to main"
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9
        with:
          branch: main
          commit_message: "Update release notes"
          file_pattern: "sboms/*.md"

  os-integration:
    needs: [prepare-matrix, packer]
    name: "OS Integration Tests - ${{ matrix.config }}"
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.os_integration_matrix) }}
    uses: ./.github/workflows/os-integration.yml
    with:
      config: ${{ matrix.config }}
    secrets:
      TASKCLUSTER_OS_INT_CLIENT_ID: ${{ secrets.TASKCLUSTER_OS_INT_CLIENT_ID }}
      TASKCLUSTER_OS_INT_ACCESS_TOKEN: ${{ secrets.TASKCLUSTER_OS_INT_ACCESS_TOKEN }}
