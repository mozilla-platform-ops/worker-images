run-name: TCEng AWS - ${{ github.event.inputs.config }}
name: TCEng AWS

on:
  workflow_dispatch:
    inputs:
      config:
        type: choice
        description: Choose which pool to build
        options:
          - generic-worker-ubuntu-24-04
          - generic-worker-ubuntu-24-04-arm64
          - generic-worker-ubuntu-24-04-staging
      aws_account:
        type: choice
        description: Choose which AWS account to build in
        default: community-tc-workers
        options:
          - community-tc-workers
          - taskcluster
      region:
        type: choice
        description: Choose the AWS region to build in
        default: us-west-2
        options:
          - us-west-2
          - us-east-1
          - us-east-2
          - us-west-1
          - eu-west-1

permissions:
  id-token: write
  contents: read

env:
  COMMUNITY_TC_WORKERS_AWS_ROLE_ARN: arn:aws:iam::885316786408:role/GitHubActionsRole
  TASKCLUSTER_AWS_ROLE_ARN: arn:aws:iam::692406183521:role/GitHubActionsRole

jobs:
  check-access:
    name: "Verify User Access"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Load Authorized Users and Check Access
        shell: pwsh
        run: |
          $TCEngUsers  = Get-Content .github/tceng.json  | ConvertFrom-Json
          $RelsreUsers = Get-Content .github/relsre.json | ConvertFrom-Json
          $AUTHORIZED_USERS = $TCEngUsers + $RelsreUsers

          if ($AUTHORIZED_USERS -contains "${{ github.actor }}") {
            Write-Host "User ${{ github.actor }} is authorized."
          } else {
            Write-Host "User ${{ github.actor }} is unauthorized."
            exit 1
          }

  packer:
    needs: check-access
    name: "AWS ${{ github.event.inputs.config }}"
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Select AWS role
        id: aws-role
        shell: bash
        run: |
          case "${{ github.event.inputs.aws_account }}" in
            community-tc-workers)
              echo "role-arn=${COMMUNITY_TC_WORKERS_AWS_ROLE_ARN}" >> "${GITHUB_OUTPUT}"
              ;;
            taskcluster)
              echo "role-arn=${TASKCLUSTER_AWS_ROLE_ARN}" >> "${GITHUB_OUTPUT}"
              ;;
            *)
              echo "Unsupported AWS account: ${{ github.event.inputs.aws_account }}" >&2
              exit 1
              ;;
          esac

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b
        with:
          role-to-assume: ${{ steps.aws-role.outputs.role-arn }}
          aws-region: ${{ github.event.inputs.region }}
          role-session-name: github-actions-packer-build

      - name: Setup Packer
        uses: hashicorp/setup-packer@3286471d6cc6756d056a0b199fea5e0becdbc189

      - name: Run Packer
        shell: pwsh
        run: |
          Import-Module "${{ github.workspace }}/bin/WorkerImages/WorkerImages.psm1"
          $Vars = @{
            Key     = '${{ github.event.inputs.config }}'
            Region  = '${{ github.event.inputs.region }}'
          }

          New-AWSWorkerImage @Vars
