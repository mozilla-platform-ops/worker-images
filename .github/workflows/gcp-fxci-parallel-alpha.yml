name: FXCI - GCP Alpha Parallel Images
run-name: GCP Alpha Parallel - ${{ github.sha }}

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  prepare-matrix:
    name: Prepare GCP Alpha Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      os_integration_matrix: ${{ steps.set-matrix.outputs.os_integration_matrix }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - id: set-matrix
        name: Extract GCP alpha configs
        shell: pwsh
        run: |
          $configs = Get-ChildItem -Path ./config -File -Filter "*.yaml" |
            ForEach-Object { $_.BaseName } |
            Where-Object { $_ -match '^(trusted-)?gw-fxci-gcp-.*-alpha$' } |
            Sort-Object

          if (-not $configs -or $configs.Count -eq 0) {
            Write-Host "::error ::No GCP alpha image configs found in ./config"
            exit 1
          }

          $matrix = @{ config = @($configs) } | ConvertTo-Json -Compress
          Write-Host "Generated matrix: $matrix"
          "matrix=$matrix" >> $env:GITHUB_OUTPUT

          # Only level-1 (untrusted) alpha configs have matching alpha worker pools
          # in fxci-config that the os-integration cron can target. Skip trusted-
          # (level-3) configs.
          $osIntConfigs = $configs | Where-Object { $_ -notmatch '^trusted-' }
          $osIntMatrix = @{ config = @($osIntConfigs) } | ConvertTo-Json -Compress
          Write-Host "Generated os-integration matrix: $osIntMatrix"
          "os_integration_matrix=$osIntMatrix" >> $env:GITHUB_OUTPUT

  check-access:
    name: Verify User Access
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Load Authorized Users and Check Access
        shell: pwsh
        run: |
          $AUTHORIZED_USERS=$(Get-Content .github/relsre.json | Convertfrom-Json)
          if ($authorized_users -contains "${{ github.actor }}") {
            Write-host "User ${{ github.actor }} is authorized."
          }
          else {
            Write-Host "User ${{ github.actor }} is unauthorized."
            exit 1
          }

  packer:
    needs: [check-access, prepare-matrix]
    name: Build ${{ matrix.config }}
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - id: set-gcp-vars
        name: Set project and image metadata
        shell: pwsh
        run: |
          Import-Module ${{ github.workspace }}\bin\WorkerImages\WorkerImages.psm1
          Set-GCPWorkerImageName -Key '${{ matrix.config }}'
          Set-GCPWorkerImageProject -Key '${{ matrix.config }}'

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
        id: auth
        with:
          workload_identity_provider: "projects/324168772199/locations/global/workloadIdentityPools/github-actions/providers/github-actions"
          service_account: "deploy-prod@${{ steps.set-gcp-vars.outputs.PROJECT }}.iam.gserviceaccount.com"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db

      - name: Run Packer
        shell: pwsh
        run: |
          Import-Module ${{ github.workspace }}\bin\WorkerImages\WorkerImages.psm1
          $Vars = @{
            github_token = "${{ secrets.GITHUB_TOKEN }}"
            Key = '${{ matrix.config }}'
          }
          New-GCPWorkerImage @Vars

  find-successful-builds:
    needs: [prepare-matrix, packer]
    name: "Filter matrices to successful packer builds"
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    permissions:
      actions: read
    outputs:
      wiz_matrix: ${{ steps.filter.outputs.wiz_matrix }}
      os_integration_matrix: ${{ steps.filter.outputs.os_integration_matrix }}
    steps:
      - id: filter
        name: Query run jobs API for successful packer entries
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORIGINAL_OS_INT_MATRIX: ${{ needs.prepare-matrix.outputs.os_integration_matrix }}
        run: |
          $allJobs = gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" --paginate | ConvertFrom-Json
          $successful = @()
          foreach ($job in $allJobs.jobs) {
            if ($job.name -match '^Build (.+)$' -and $job.conclusion -eq 'success') {
              $successful += $matches[1]
            }
          }
          Write-Host "Successful packer configs: $($successful -join ', ')"

          # Wiz runs against every successful non-trusted build.
          $wizConfigs = @($successful | Where-Object { $_ -notmatch '^trusted-' })
          $wizMatrix = @{ config = $wizConfigs } | ConvertTo-Json -Compress
          Write-Host "wiz_matrix=$wizMatrix (count=$($wizConfigs.Count))"
          "wiz_matrix=$wizMatrix" >> $env:GITHUB_OUTPUT

          # os-integration runs against configs that were both in the original
          # os_integration_matrix (level-1) AND succeeded in packer.
          $original = ConvertFrom-Json $env:ORIGINAL_OS_INT_MATRIX
          $osIntConfigs = @($original.config | Where-Object { $successful -contains $_ })
          $osIntMatrix = @{ config = $osIntConfigs } | ConvertTo-Json -Compress
          Write-Host "os_integration_matrix=$osIntMatrix (count=$($osIntConfigs.Count))"
          "os_integration_matrix=$osIntMatrix" >> $env:GITHUB_OUTPUT

  wiz-scan:
    needs: [find-successful-builds]
    name: "Wiz Scan - ${{ matrix.config }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.find-successful-builds.outputs.wiz_matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - id: set-gcp-vars
        name: Set project and image metadata
        shell: pwsh
        run: |
          Import-Module ${{ github.workspace }}\bin\WorkerImages\WorkerImages.psm1
          Set-GCPWorkerImageName -Key '${{ matrix.config }}'
          Set-GCPWorkerImageProject -Key '${{ matrix.config }}'

      - name: Download Wiz CLI
        run: curl -o wizcli https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64 && chmod +x wizcli

      - name: Authenticate to Wiz
        run: ./wizcli auth --id "$WIZ_CLIENT_ID" --secret "$WIZ_CLIENT_SECRET"
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}

      - name: Run wiz-cli scan
        run: |
          ./wizcli vm-image scan \
          --id ${{ steps.set-gcp-vars.outputs.IMAGENAME }} \
          --region us-west1 \
          --subscriptionId ${{ steps.set-gcp-vars.outputs.PROJECT }} \
          --secrets \
          --show-vulnerability-details \
          --policy-hits-only
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}

  os-integration:
    needs: [find-successful-builds]
    name: "OS Integration Tests - ${{ matrix.config }}"
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.find-successful-builds.outputs.os_integration_matrix) }}
    uses: ./.github/workflows/os-integration.yml
    with:
      config: ${{ matrix.config }}
    secrets:
      TASKCLUSTER_OS_INT_CLIENT_ID: ${{ secrets.TASKCLUSTER_OS_INT_CLIENT_ID }}
      TASKCLUSTER_OS_INT_ACCESS_TOKEN: ${{ secrets.TASKCLUSTER_OS_INT_ACCESS_TOKEN }}
